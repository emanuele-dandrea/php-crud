<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Page not found</title>

  <!-- Bootstrap icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

  <script>
    // Theme adapt to system
    function setTheme(isDark) {
      document.documentElement.dataset.bsTheme = isDark ? 'dark' : 'light';
    }

    const isDark = window.matchMedia('(prefers-color-scheme: dark)');
    isDark.addEventListener('change', (e) => setTheme(e.matches));
    setTheme(isDark.matches);
  </script>

  <!-- Bootstrap CSS minified -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

  <link href="/main.css" rel="stylesheet">
</head>

<body class="d-flex justify-content-center align-items-center vh-100">
  <div class="text-center">
    <h1 class="display-1 fw-bold text-danger">404</h1>
    <p class="fs-4 text-muted">Page not found</p>
    <a href="/" class="btn btn-primary">Go to homepage <i class="bi bi-house-fill"></i></a>
  </div>
</body>

</html>
